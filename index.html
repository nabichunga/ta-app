<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TA 자아상태 진단</title>

<style>
body {
  font-family: 'Malgun Gothic', sans-serif;
  background:#e9ecef;
  padding:20px;
}

.container {
  max-width:800px;
  margin:auto;
  background:#fff;
  padding:40px;
  border:1px solid #ccc;
}

h1 {
  text-align:center;
  border-bottom:2px solid #333;
  padding-bottom:10px;
}

input {
  width:100%;
  padding:8px;
  margin:20px 0;
  border:1px solid #999;
}

.question {
  margin-bottom:20px;
}

button {
  margin:2px;
  padding:5px 8px;
}

button.active {
  background:#2c7be5;
  color:#fff;
}

.result-box {
  margin-top:40px;
  border-top:2px solid #333;
  padding-top:20px;
}

/* 그래프 */
.chart {
  display:flex;
  justify-content:space-around;
  align-items:flex-end;
  height:200px;
  margin-top:30px;
}

.bar {
  width:60px;
  text-align:center;
  color:#fff;
  border-radius:5px 5px 0 0;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  padding-bottom:5px;
  font-weight:bold;
}

.cp{background:#e74c3c;}
.np{background:#2ecc71;}
.a{background:#3498db;}
.fc{background:#f1c40f;}
.ac{background:#9b59b6;}

/* 라벨 */
.label-row {
  display:flex;
  justify-content:space-around;
  margin-top:10px;
  font-size:13px;
  text-align:center;
}

.label-row div {
  width:60px;
}

/* 점수 */
.score-box {
  margin-top:20px;
  line-height:1.8;
}
</style>
</head>

<body>

<div class="container">
<h1>TA 자아상태 진단</h1>

<input type="text" id="username" placeholder="이름 입력">

<div id="survey"></div>
<button onclick="showResult()">결과 보기</button>

<div id="result"></div>
</div>

<script>

// 질문
const questions = [
{ id:1,text:"다른 사람을 비판하기 보다 칭찬을 주로 한다",type:"NP"},
{ id:2,text:"잘잘못을 가리지 않으면 불편하다",type:"CP"},
{ id:3,text:"결정을 잘 못한다",type:"AC"},
{ id:4,text:"장난을 잘 친다",type:"FC"},
{ id:5,text:"침착하다",type:"A"},
{ id:6,text:"성격이 급하고 화를 잘 낸다",type:"CP"},
{ id:7,text:"타인의 입장을 먼저 생각한다",type:"NP"},
{ id:8,text:"창의적인 생각을 잘한다",type:"FC"},
{ id:9,text:"정리정돈을 잘 한다",type:"A"},
{ id:10,text:"농담을 좋아한다",type:"FC"},
{ id:11,text:"지시받는 것이 편하다",type:"AC"},
{ id:12,text:"공감하기를 잘한다",type:"NP"},
{ id:13,text:"실수에 엄격하다",type:"CP"},
{ id:14,text:"어려운 사람을 도와준다",type:"NP"},
{ id:15,text:"자료 중심으로 말한다",type:"A"},
{ id:16,text:"즉흥적으로 행동한다",type:"FC"},
{ id:17,text:"후회를 많이 한다",type:"AC"},
{ id:18,text:"자책하는 경우가 많다",type:"AC"},
{ id:19,text:"논리적으로 설명한다",type:"A"},
{ id:20,text:"계획적으로 행동한다",type:"A"},
{ id:21,text:"적극적으로 나서지 못한다",type:"AC"},
{ id:22,text:"객관적으로 판단한다",type:"A"},
{ id:23,text:"거절을 잘 못한다",type:"AC"},
{ id:24,text:"내 의견을 우선한다",type:"CP"},
{ id:25,text:"봉사활동을 좋아한다",type:"NP"},
{ id:26,text:"배려심이 많다",type:"NP"},
{ id:27,text:"지나치게 즐기는 경우가 있다",type:"FC"},
{ id:28,text:"결점이 먼저 보인다",type:"CP"},
{ id:29,text:"타인의 의견을 따른다",type:"AC"},
{ id:30,text:"온화하다",type:"NP"},
{ id:31,text:"말을 끊는다",type:"CP"},
{ id:32,text:"노래나 춤을 좋아한다",type:"FC"},
{ id:33,text:"계획 후 실행한다",type:"A"},
{ id:34,text:"반드시라는 말을 자주 쓴다",type:"CP"},
{ id:35,text:"눈치를 많이 본다",type:"AC"},
{ id:36,text:"장난을 잘 한다",type:"FC"},
{ id:37,text:"분석적으로 판단한다",type:"A"},
{ id:38,text:"욕구 충족이 강하다",type:"FC"},
{ id:39,text:"감정을 억제한다",type:"AC"},
{ id:40,text:"부드럽다",type:"NP"},
{ id:41,text:"우선순위를 중요하게 생각한다",type:"A"},
{ id:42,text:"표현이 어렵다",type:"AC"},
{ id:43,text:"지시형 말투를 쓴다",type:"CP"},
{ id:44,text:"분위기에 잘 어울린다",type:"FC"},
{ id:45,text:"정에 약하다",type:"NP"},
{ id:46,text:"이성적으로 대화한다",type:"A"},
{ id:47,text:"지시에 따른다",type:"AC"},
{ id:48,text:"의견을 끝까지 밀어붙인다",type:"CP"},
{ id:49,text:"감탄사를 자주 쓴다",type:"FC"},
{ id:50,text:"비판적인 편이다",type:"CP"}
];

let userScores = {};
const survey = document.getElementById('survey');

questions.forEach(q=>{
const div = document.createElement('div');
div.className="question";
div.innerHTML=`
<p>${q.id}. ${q.text}</p>
${[1,2,3,4,5].map(v=>`<button onclick="setScore(${q.id},${v},this)">${v}</button>`).join('')}
`;
survey.appendChild(div);
});

function setScore(id,val,btn){
userScores[id]=val;
btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
}

function showResult(){

if(Object.keys(userScores).length<50){
alert("모든 문항을 체크해주세요");
return;
}

const sums={CP:0,NP:0,A:0,FC:0,AC:0};
questions.forEach(q=>sums[q.type]+=userScores[q.id]);

const labels={
CP:"통제의 언어",
NP:"배려의 언어",
A:"합리적 언어",
FC:"표현의 언어",
AC:"수용의 언어"
};

// 상위 2개
let sorted=Object.entries(sums).sort((a,b)=>b[1]-a[1]);
let top1=sorted[0][0];
let top2=sorted[1][0];

const comboDesc={
"FC-NP":"표현과 배려가 조화된 관계 중심형",
"A-NP":"논리와 배려를 갖춘 균형형",
"CP-A":"원칙과 논리 중심 리더형",
"AC-NP":"조화와 협력 중심형"
};

let comboText=comboDesc[top1+"-"+top2]||"유연한 커뮤니케이션 스타일";

// 그래프
let chartHTML=`<div class="chart">`;
for(let key in sums){
chartHTML+=`<div class="bar ${key.toLowerCase()}" style="height:${sums[key]*2}px">${sums[key]}</div>`;
}
chartHTML+=`</div>`;

// 라벨
chartHTML+=`<div class="label-row">`;
for(let key in sums){
chartHTML+=`<div>${labels[key]}</div>`;
}
chartHTML+=`</div>`;

// 점수표
let scoreHTML=`<div class="score-box">`;
for(let key in sums){
scoreHTML+=`${labels[key]} : ${sums[key]}점<br>`;
}
scoreHTML+=`</div>`;

document.getElementById('result').innerHTML=`
<div class="result-box">
<h2>진단 결과</h2>
<h3>${labels[top1]}</h3>
<p>조합: ${labels[top1]} + ${labels[top2]}</p>
<p>${comboText}</p>
${chartHTML}
${scoreHTML}
</div>
`;
}

</script>

</body>
</html>
