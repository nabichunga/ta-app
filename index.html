<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TA 자아상태 진단</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: sans-serif; background:#f4f7f6; padding:20px; }
.container { max-width:700px; margin:auto; background:#fff; padding:20px; border-radius:15px; }
.question { margin-bottom:15px; }
button { margin:2px; padding:8px 10px; }
button.active { background:#3498db; color:#fff; }
.submit-btn { width:100%; padding:15px; margin-top:20px; }

.chart { display:flex; justify-content:space-around; align-items:flex-end; height:200px; margin-top:20px; }
.bar { width:60px; text-align:center; color:#fff; border-radius:5px 5px 0 0; padding-top:5px; font-size:12px; }
.cp{background:#e74c3c;} .np{background:#2ecc71;}
.a{background:#3498db;} .fc{background:#f1c40f;}
.ac{background:#9b59b6;}

.score-box { margin-top:20px; }
.score-item { margin:5px 0; }

.result-box { margin-top:20px; padding:15px; background:#eef6ff; border-radius:10px; }
</style>
</head>

<body>

<div class="container" id="capture">
<h1>TA 자아상태 진단</h1>

<input type="text" id="username" placeholder="이름 입력" style="width:100%; padding:10px; margin-bottom:10px;">

<div id="survey"></div>
<button class="submit-btn" onclick="showResult()">결과 보기</button>

<div id="result"></div>
</div>

<script>

// 50문항
const questions = [
{ id:1,text:"다른 사람을 비판하기 보다 칭찬을 주로 한다",type:"NP"},
{ id:2,text:"잘잘못을 가리지 않으면 불편하다",type:"CP"},
{ id:3,text:"결정을 잘 못한다",type:"AC"},
{ id:4,text:"장난을 잘 친다",type:"FC"},
{ id:5,text:"침착하다",type:"A"},
{ id:6,text:"성격이 급하고 화를 잘 낸다",type:"CP"},
{ id:7,text:"타인의 입장을 먼저 생각한다",type:"NP"},
{ id:8,text:"창의적인 생각을 잘한다",type:"FC"},
{ id:9,text:"정리정돈을 잘 한다",type:"A"},
{ id:10,text:"농담을 좋아한다",type:"FC"},
{ id:11,text:"지시받는 것이 편하다",type:"AC"},
{ id:12,text:"공감하기를 잘한다",type:"NP"},
{ id:13,text:"실수에 엄격하다",type:"CP"},
{ id:14,text:"어려운 사람을 도와준다",type:"NP"},
{ id:15,text:"자료 중심으로 말한다",type:"A"},
{ id:16,text:"즉흥적으로 행동한다",type:"FC"},
{ id:17,text:"후회를 많이 한다",type:"AC"},
{ id:18,text:"자책하는 경우가 많다",type:"AC"},
{ id:19,text:"논리적으로 설명한다",type:"A"},
{ id:20,text:"계획적으로 행동한다",type:"A"},
{ id:21,text:"적극적으로 나서지 못한다",type:"AC"},
{ id:22,text:"객관적으로 판단한다",type:"A"},
{ id:23,text:"거절을 잘 못한다",type:"AC"},
{ id:24,text:"내 의견을 우선한다",type:"CP"},
{ id:25,text:"봉사활동을 좋아한다",type:"NP"},
{ id:26,text:"배려심이 많다",type:"NP"},
{ id:27,text:"지나치게 즐기는 경우가 있다",type:"FC"},
{ id:28,text:"결점이 먼저 보인다",type:"CP"},
{ id:29,text:"타인의 의견을 따른다",type:"AC"},
{ id:30,text:"온화하다",type:"NP"},
{ id:31,text:"말을 끊는다",type:"CP"},
{ id:32,text:"노래나 춤을 좋아한다",type:"FC"},
{ id:33,text:"계획 후 실행한다",type:"A"},
{ id:34,text:"반드시라는 말을 자주 쓴다",type:"CP"},
{ id:35,text:"눈치를 많이 본다",type:"AC"},
{ id:36,text:"장난을 잘 한다",type:"FC"},
{ id:37,text:"분석적으로 판단한다",type:"A"},
{ id:38,text:"욕구 충족이 강하다",type:"FC"},
{ id:39,text:"감정을 억제한다",type:"AC"},
{ id:40,text:"부드럽다",type:"NP"},
{ id:41,text:"우선순위를 중요하게 생각한다",type:"A"},
{ id:42,text:"표현이 어렵다",type:"AC"},
{ id:43,text:"지시형 말투를 쓴다",type:"CP"},
{ id:44,text:"분위기에 잘 어울린다",type:"FC"},
{ id:45,text:"정에 약하다",type:"NP"},
{ id:46,text:"이성적으로 대화한다",type:"A"},
{ id:47,text:"지시에 따른다",type:"AC"},
{ id:48,text:"의견을 끝까지 밀어붙인다",type:"CP"},
{ id:49,text:"감탄사를 자주 쓴다",type:"FC"},
{ id:50,text:"비판적인 편이다",type:"CP"}
];

let userScores = {};
const survey = document.getElementById('survey');

questions.forEach(q=>{
const div = document.createElement('div');
div.className = "question";
div.innerHTML = `
<p>${q.id}. ${q.text}</p>
${[1,2,3,4,5].map(v=>`<button onclick="setScore(${q.id},${v},this)">${v}</button>`).join('')}
`;
survey.appendChild(div);
});

function setScore(id,val,btn){
userScores[id] = val;
btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
}

function showResult(){
if(Object.keys(userScores).length < 50){
alert("모든 문항을 체크해주세요");
return;
}

const sums = {CP:0,NP:0,A:0,FC:0,AC:0};
questions.forEach(q => sums[q.type] += userScores[q.id]);

const labels = {
CP:"통제의 언어",
NP:"배려의 언어",
A:"합리적 언어",
FC:"표현의 언어",
AC:"수용의 언어"
};

const desc = {
CP:"원칙과 기준이 분명하지만 강하게 보일 수 있습니다.",
NP:"타인을 배려하고 따뜻한 관계를 만듭니다.",
A:"논리적이고 객관적인 의사결정을 합니다.",
FC:"감정 표현이 풍부하고 활력이 있습니다.",
AC:"조화롭고 협력적인 태도를 가집니다."
};

// 👉 상위 2개 찾기
let sorted = Object.entries(sums).sort((a,b)=>b[1]-a[1]);
let top1 = sorted[0][0];
let top2 = sorted[1][0];

// 👉 조합 해석
const comboDesc = {
"FC-NP":"표현력과 배려가 함께 높아 사람을 끌어당기는 소통 스타일입니다.",
"A-NP":"논리와 배려를 함께 갖춘 균형 잡힌 커뮤니케이션입니다.",
"CP-A":"원칙과 논리를 중시하는 리더형 스타일입니다.",
"FC-CP":"표현은 강하지만 통제도 강해 갈등이 생길 수 있습니다.",
"AC-NP":"타인을 배려하고 맞추는 협력형 스타일입니다."
};

let comboKey = top1+"-"+top2;
let comboText = comboDesc[comboKey] || "상황에 따라 다양한 커뮤니케이션을 사용하는 유연한 스타일입니다.";

// 그래프
let chartHTML = `<div class="chart">`;
for(let key in sums){
chartHTML += `<div class="bar ${key.toLowerCase()}" style="height:${sums[key]*2}px">
<strong>${sums[key]}</strong><br>${labels[key]}
</div>`;
}
chartHTML += `</div>`;

// 점수표
let scoreHTML = `<div class="score-box">`;
for(let key in sums){
scoreHTML += `<div class="score-item">${labels[key]} : <strong>${sums[key]}점</strong></div>`;
}
scoreHTML += `</div>`;

document.getElementById('result').innerHTML = `
<div class="result-box">
<h2>진단 결과</h2>
<h3>${labels[top1]}</h3>
<p>${desc[top1]}</p>

<h4>조합 해석 (${labels[top1]} + ${labels[top2]})</h4>
<p>${comboText}</p>

${chartHTML}
${scoreHTML}

<button class="submit-btn" onclick="downloadPDF()">PDF 저장</button>
</div>
`;
}

// PDF
async function downloadPDF(){
const { jsPDF } = window.jspdf;
const canvas = await html2canvas(document.getElementById('capture'));
const imgData = canvas.toDataURL('image/png');

const pdf = new jsPDF();
pdf.addImage(imgData,'PNG',10,10,190,0);
pdf.save("TA결과.pdf");
}

</script>

</body>
</html>
